name: Java Maven CI

on:
  push:
    branches:
      - development
  pull_request:
    branches:
      - development

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout code from repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2: Set up Java
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # Step 3: Build with Maven
      - name: Build with Maven
        run: mvn -B clean install

      # Step 4: Run tests
      - name: Run tests
        run: mvn test

      # Optional: Upload WAR/JAR as a build artifact
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: pahanaedu-artifact
          path: target/*.war
